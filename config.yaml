jarvis:
  name: "JARVIS"
  wake_word: "jarvis"
  humor_level: 75
  version: "1.0.0"

llm:
  provider: "groq"                          # Options: "groq", "gemini", "ollama"

  # Groq (free, blazingly fast — recommended)
  groq_api_key: ""                          # Get from https://console.groq.com
  groq_model: "llama-3.1-8b-instant"        # Fast and capable
  groq_api_url: "https://api.groq.com/openai/v1"

  # Google Gemini (free tier available)
  gemini_api_key: ""                        # Get from https://aistudio.google.com/apikey
  gemini_model: "gemini-2.0-flash"
  gemini_api_url: "https://generativelanguage.googleapis.com/v1beta"

  # Ollama (local, offline fallback)
  model: "gemma2:2b"                        # Smaller model for local use
  api_url: "http://localhost:11434"

  temperature: 0.7
  max_tokens: 256
  timeout: 30                               # Cloud APIs are much faster
  retry_attempts: 3

voice:
  enabled: true
  engine: "pyttsx3"
  rate: 175
  volume: 0.9
  voice_index: 0
  vosk_model_path: "models/vosk-model-small-en-us-0.15"
  silence_timeout: 1.5
  activation_beep: true

vision:
  enabled: true
  capture_fps: 1
  ocr_engine: "easyocr"
  screenshot_dir: "data/screenshots"
  change_threshold: 30

system:
  safe_mode: true
  log_level: "INFO"
  memory_db: "data/jarvis_memory.db"
  file_index_db: "data/file_index.db"
  action_delay: 0.05
  human_typing_speed: 0.03

interface:
  theme: "dark"
  show_dashboard: true
  hotkey: "ctrl+shift+j"
  tray_icon: true

automation:
  scripts_dir: "data/automations"
  recordings_dir: "data/recordings"
